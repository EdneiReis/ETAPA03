{% load static %}
<!DOCTYPE html>
<html lang="pt-br" class="login-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TRI.BUNAL</title>
    <link rel="icon" type="image/png" href="{% static 'img/1778709534708.png' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="login-page">
    <div class="split-login-container">
        <div class="login-left">
            <div class="welcome-text">
                <img src="{% static 'img/image_dc2d18.png' %}" alt="Logo TRI.BUNAL" class="login-logo-inline">
                <h1 class="hero-title-login">Bem-vindo!</h1>
                <p class="hero-subtitle-login">Acesse o seu painel para processar cartões-resposta, gerenciar resultados e analisar o desempenho das turmas.</p>
            </div>
        </div>

        <div class="login-right">
            <div class="login-form-wrapper">
                <h2>Login</h2>

                {% if form.errors %}
                <p class="login-error">Usuário ou senha incorretos. Tente novamente.</p>
                {% endif %}

                <form method="post" action="">
                    {% csrf_token %}

                    <div class="input-group">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" name="username" placeholder="Usuário ou Email" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username">
                    </div>

                    <div class="input-group">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <input type="password" name="password" id="id_password" placeholder="Senha" autocomplete="current-password" required>
                        <button type="button" id="togglePassword" class="eye-btn" aria-label="Mostrar senha">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <span id="eyeText" class="eye-text">Exibir</span>
                        </button>
                    </div>

                    <button type="submit" class="btn-glow-primary">Entrar</button>
                </form>
            </div>
        </div>
    </div>
    <script src="{% static 'js/login.js' %}" defer></script>
</body>
</html>
